name: Test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: examflow_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9.0.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter api test:cov
      - run: pnpm --filter web test -- --runInBand
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/examflow_test
          TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/examflow_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret-key-min-32-characters-long
          JWT_REFRESH_SECRET: test-refresh-secret-min-32-chars
          FRONTEND_URL: http://localhost:3000
          NODE_ENV: test
